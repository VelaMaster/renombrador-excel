name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin, incluye jpackage)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar fat JAR
        run: mvn -B -q clean package

      - name: Preparar carpeta para jpackage
        shell: cmd
        run: |
          if exist dist rmdir /S /Q dist
          mkdir dist\input
          copy /Y target\renombrador-excel.jar dist\input\

      # 1) Versión portable (carpeta + .exe + runtime). Se debe usar la CARPETA completa.
      - name: Generar app-image portable
        shell: cmd
        run: |
          jpackage ^
            --type app-image ^
            --name RenombradorExcel ^
            --input dist\input ^
            --main-jar renombrador-excel.jar ^
            --main-class com.renombrador.Main ^
            --dest dist\portable ^
            --app-version 1.0.0

      - name: Empaquetar portable en ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist\portable\RenombradorExcel\* -DestinationPath RenombradorExcel-portable.zip

      # 2) Instalador .exe real (con WiX). Esto es lo que el usuario final debe correr.
      - name: Instalar WiX Toolset 3 (necesario para --type exe)
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Generar instalador .exe
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --name RenombradorExcel ^
            --input dist\input ^
            --main-jar renombrador-excel.jar ^
            --main-class com.renombrador.Main ^
            --dest dist\installer ^
            --app-version 1.0.0 ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut

      - name: Renombrar instalador
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\installer\*.exe | Select-Object -First 1
          Copy-Item $exe.FullName RenombradorExcel-installer.exe

      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: RenombradorExcel-windows
          path: |
            RenombradorExcel-installer.exe
            RenombradorExcel-portable.zip
            target/renombrador-excel.jar

      - name: Crear Release en tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RenombradorExcel-installer.exe
            RenombradorExcel-portable.zip
            target/renombrador-excel.jar
